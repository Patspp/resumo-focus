name: Focus – Download e Extração

on:
  schedule:
    - cron: "15 12 * * 1"  # toda segunda às 12h15 UTC (9h15 BRT)
  workflow_dispatch:        # permite disparo manual pela interface do GitHub

permissions:
  contents: write

jobs:
  baixar-e-extrair:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Baixar PDF do Focus
        run: python src/baixar_focus.py

      - name: Extrair texto do PDF
        run: python src/extrair_texto.py

      - name: Commitar arquivos gerados (se houver novidade)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/focus_*.pdf data/focus_*.txt
          # --diff-index falha silenciosamente se não houver mudança; o "|| true"
          # impede que o passo falhe quando nada foi baixado
          git diff --cached --quiet || git commit -m "chore: Focus $(date -u +%Y-%m-%d)"
          git push
